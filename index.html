<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OBS Auction Scene Builder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }
    .box {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 24px;
      margin-top: 20px;
    }
    button {
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }
    #downloadLink {
      display: none;
      margin-top: 20px;
      font-weight: bold;
    }
    #status {
      margin-top: 20px;
      white-space: pre-wrap;
      text-align: left;
      background: #f7f7f7;
      border-radius: 8px;
      padding: 12px;
    }
    code {
      background: #f3f3f3;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>OBS Auction Scene Builder</h1>

  <div class="box">
    <p>Upload only your monthly auction CSV. This page uses <code>template.json</code> from your GitHub repo as the OBS master template.</p>

    <p><strong>Upload Auction CSV</strong></p>
    <input type="file" id="csvFile" accept=".csv" />

    <div>
      <button id="generateBtn">Generate New Scene Collection</button>
    </div>

    <div>
      <a id="downloadLink">Download Updated OBS File</a>
    </div>

    <div id="status">Waiting for CSV...</div>
  </div>

  <script>
    document.getElementById("generateBtn").addEventListener("click", processFiles);

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    async function processFiles() {
      const csvFile = document.getElementById("csvFile").files[0];

      if (!csvFile) {
        alert("Please upload the monthly CSV.");
        return;
      }

      try {
        setStatus("Loading template.json from your GitHub repo...");
        const templateResponse = await fetch("./template.json");
        if (!templateResponse.ok) {
          throw new Error("Could not load template.json from the repo.");
        }
        const templateData = await templateResponse.json();

        setStatus("Reading CSV...");
        const csvText = await readFileAsText(csvFile);

        setStatus("Parsing CSV...");
        const rows = parseCSVRows(csvText);
        if (!rows.length) {
          throw new Error("No usable rows found in CSV.");
        }

        setStatus("Building scene collection...");
        const output = buildFromTemplate(templateData, rows);

        downloadJSON(output, "updated_scene_collection.json");
        setStatus(
          "Done.\n" +
          "Rows found: " + rows.length + "\n" +
          "Scene collection generated successfully."
        );
      } catch (error) {
        console.error(error);
        alert("Error: " + error.message);
        setStatus("Error: " + error.message);
      }
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsText(file);
      });
    }

    function splitCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function cleanCell(value) {
      return String(value || "").trim().replace(/^"|"$/g, "");
    }

    function normalizeLot(rawLot) {
      const lot = rawLot.replace(/\s+/g, "").toUpperCase();
      const match = lot.match(/^(\d+)([A-Z])$/);
      if (match) {
        return match[1] + "-" + match[2];
      }
      return lot;
    }

    function parseCSVRows(csvText) {
      const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== "");
      if (lines.length < 2) return [];

      const headers = splitCSVLine(lines[0]).map(h => cleanCell(h));
      const lotIndex = headers.findIndex(h => h.toLowerCase() === "lot number");
      const typeIndex = headers.findIndex(h => h.toLowerCase() === "type");

      if (lotIndex === -1) throw new Error('Could not find "Lot Number" column.');
      if (typeIndex === -1) throw new Error('Could not find "Type" column.');

      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = splitCSVLine(lines[i]);
        const lot = normalizeLot(cleanCell(cols[lotIndex] || ""));
        const type = cleanCell(cols[typeIndex] || "");

        if (!lot) continue;
        rows.push({ lot, type });
      }

      return rows;
    }

    function normalizeSceneName(name) {
      return String(name).replace(/\s+/g, " ").trim();
    }

    function isLotTransitionScene(name) {
      return /^\d+(-[A-Z])? Transition$/i.test(normalizeSceneName(name));
    }

    function isLotVideoScene(name) {
      return /^\d+(-[A-Z])? Video$/i.test(normalizeSceneName(name));
    }

    function isOptionLot(lot) {
      return /^\d+-[A-Z]$/i.test(String(lot).trim());
    }

    function getOptionBase(lot) {
      const match = String(lot).trim().toUpperCase().match(/^(\d+)-[A-Z]$/);
      return match ? match[1] : null;
    }

    function deepClone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function getSourceMap(templateData) {
      const map = new Map();
      for (const source of (templateData.sources || [])) {
        if (source && source.name) {
          map.set(normalizeSceneName(source.name), deepClone(source));
        }
      }
      return map;
    }

    function getBreedTransitionFromType(typeValue) {
      const t = String(typeValue || "").trim().toLowerCase();

      if (t === "char x") return "Charloais Transition";
      if (t === "natives") return "Native Transition";
      if (t === "holstein steers") return "Hosltein Transition";

      return null;
    }

    function getBreedKeyFromType(typeValue) {
      const t = String(typeValue || "").trim().toLowerCase();

      if (t === "char x") return "char_x";
      if (t === "natives") return "natives";
      if (t === "holstein steers") return "holstein_steers";

      return "black_x_beef_on_dairy";
    }

    function groupRows(rows) {
      const groups = [];
      let i = 0;

      while (i < rows.length) {
        const row = rows[i];

        if (!isOptionLot(row.lot)) {
          groups.push({
            kind: "single",
            type: row.type,
            rows: [row]
          });
          i++;
          continue;
        }

        const base = getOptionBase(row.lot);
        const type = row.type;
        const optionRows = [row];
        let j = i + 1;

        while (j < rows.length) {
          const next = rows[j];
          if (isOptionLot(next.lot) && getOptionBase(next.lot) === base && next.type === type) {
            optionRows.push(next);
            j++;
          } else {
            break;
          }
        }

        if (optionRows.length >= 2) {
          groups.push({
            kind: "option_group",
            type,
            rows: optionRows
          });
          i = j;
        } else {
          groups.push({
            kind: "single",
            type: row.type,
            rows: [row]
          });
          i++;
        }
      }

      return groups;
    }

    function buildFromTemplate(templateData, rows) {
      const sourceMap = getSourceMap(templateData);
      const originalSceneNames = (templateData.scene_order || []).map(s => s.name);

      const fixedStartScenes = [
        "CMS Logo",
        "Waiting Room Scene",
        "Intro Video",
        "CMS Name Panel"
      ];

      const fixedEndScenes = [
        "CMS Name Panel END",
        "End Scene",
        "THIS IS THE END",
        "STOPPPPP",
        "I AM SERIOUS"
      ];

      const breedTransitionScenes = [
        "Charloais Transition",
        "Native Transition",
        "Hosltein Transition"
      ];

      const optionInterludePool = originalSceneNames.filter(name =>
        normalizeSceneName(name).startsWith("Option Lot Interlude")
      );

      if (!optionInterludePool.length) {
        throw new Error("No Option Lot Interlude scenes found in template.json.");
      }

      const lotTransitionPool = originalSceneNames.filter(name => isLotTransitionScene(name));
      const lotVideoPool = originalSceneNames.filter(name => isLotVideoScene(name));

      if (!lotTransitionPool.length || !lotVideoPool.length) {
        throw new Error("Could not find lot Transition/Video scenes in template.json.");
      }

      const groups = groupRows(rows);
      const finalSceneNames = [...fixedStartScenes];

      let currentBreedKey = "black_x_beef_on_dairy";
      let previousWasOptionGroup = false;
      let interludePtr = 0;

      for (const group of groups) {
        const groupBreedKey = getBreedKeyFromType(group.type);
        const breedTransition = getBreedTransitionFromType(group.type);

        if (groupBreedKey !== currentBreedKey) {
          if (breedTransition) {
            finalSceneNames.push(breedTransition);
          }
          currentBreedKey = groupBreedKey;
          previousWasOptionGroup = false;
        }

        if (group.kind === "option_group") {
          if (!previousWasOptionGroup) {
            if (interludePtr >= optionInterludePool.length) {
              throw new Error("Not enough Option Lot Interlude scenes in template.json.");
            }
            finalSceneNames.push(optionInterludePool[interludePtr++]);
          }

          for (const row of group.rows) {
            finalSceneNames.push(row.lot + " Transition");
            finalSceneNames.push(row.lot + " Video");
          }

          if (interludePtr >= optionInterludePool.length) {
            throw new Error("Not enough Option Lot Interlude scenes in template.json.");
          }
          finalSceneNames.push(optionInterludePool[interludePtr++]);

          previousWasOptionGroup = true;
        } else {
          for (const row of group.rows) {
            finalSceneNames.push(row.lot + " Transition");
            finalSceneNames.push(row.lot + " Video");
          }
          previousWasOptionGroup = false;
        }
      }

      const finalCompressed = [];
      for (let i = 0; i < finalSceneNames.length; i++) {
        const current = finalSceneNames[i];
        const prev = finalCompressed[finalCompressed.length - 1];

        const currentIsInterlude = normalizeSceneName(current).startsWith("Option Lot Interlude");
        const prevIsInterlude = prev && normalizeSceneName(prev).startsWith("Option Lot Interlude");

        if (currentIsInterlude && prevIsInterlude) {
          continue;
        }

        finalCompressed.push(current);
      }

      finalCompressed.push(...fixedEndScenes);

      const newSceneOrder = [];
      const newSceneSources = [];
      const usedExactSceneNames = new Set();

      let transitionPtr = 0;
      let videoPtr = 0;

      for (const targetName of finalCompressed) {
        let templateSceneName = null;
        const normalizedTarget = normalizeSceneName(targetName);

        if (
          fixedStartScenes.includes(targetName) ||
          fixedEndScenes.includes(targetName) ||
          breedTransitionScenes.includes(targetName) ||
          normalizedTarget.startsWith("Option Lot Interlude")
        ) {
          templateSceneName = targetName;
        } else if (isLotTransitionScene(targetName)) {
          if (transitionPtr >= lotTransitionPool.length) {
            throw new Error("Not enough Transition template scenes.");
          }
          templateSceneName = lotTransitionPool[transitionPtr++];
        } else if (isLotVideoScene(targetName)) {
          if (videoPtr >= lotVideoPool.length) {
            throw new Error("Not enough Video template scenes.");
          }
          templateSceneName = lotVideoPool[videoPtr++];
        } else {
          throw new Error("Unhandled target scene: " + targetName);
        }

        const normalizedTemplate = normalizeSceneName(templateSceneName);

        if (usedExactSceneNames.has(normalizedTarget)) {
          throw new Error("Duplicate scene name would be created: " + targetName);
        }
        usedExactSceneNames.add(normalizedTarget);

        const sourceTemplate = sourceMap.get(normalizedTemplate);
        if (!sourceTemplate) {
          throw new Error("Could not find source template for: " + templateSceneName);
        }

        const clonedSource = deepClone(sourceTemplate);
        clonedSource.name = targetName;

        newSceneOrder.push({ name: targetName });
        newSceneSources.push(clonedSource);
      }

      const nonSceneSources = (templateData.sources || [])
        .filter(source => source.id !== "scene")
        .map(source => deepClone(source));

      const output = deepClone(templateData);
      output.scene_order = newSceneOrder;
      output.sources = [...newSceneSources, ...nonSceneSources];
      output.current_scene = "STOPPPPP";
      output.current_program_scene = "End Scene";

      return output;
    }

    function downloadJSON(data, filename) {
      const blob = new Blob([JSON.stringify(data, null, 2)], {
        type: "application/json"
      });

      const url = URL.createObjectURL(blob);
      const link = document.getElementById("downloadLink");
      link.href = url;
      link.download = filename;
      link.style.display = "inline-block";
      link.textContent = "Download Updated OBS File";
    }
  </script>
</body>
</html>
