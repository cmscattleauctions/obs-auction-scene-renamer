<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OBS Auction Scene Builder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }
    .box {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 24px;
      margin-top: 20px;
    }
    button {
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }
    #downloadLink {
      display: none;
      margin-top: 20px;
      font-weight: bold;
    }
    #status {
      margin-top: 20px;
      white-space: pre-wrap;
      text-align: left;
      background: #f7f7f7;
      border-radius: 8px;
      padding: 12px;
    }
    code {
      background: #f3f3f3;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>OBS Auction Scene Builder</h1>

  <div class="box">
    <p>Upload only your monthly auction CSV. This page uses <code>template.json</code> from your GitHub repo as the OBS master template.</p>

    <p><strong>Upload Auction CSV</strong></p>
    <input type="file" id="csvFile" accept=".csv" />

    <div>
      <button id="generateBtn">Generate New Scene Collection</button>
    </div>

    <div>
      <a id="downloadLink">Download Updated OBS File</a>
    </div>

    <div id="status">Waiting for CSV...</div>
  </div>

  <script>
    document.getElementById("generateBtn").addEventListener("click", processFiles);

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    async function processFiles() {
      const csvFile = document.getElementById("csvFile").files[0];

      if (!csvFile) {
        alert("Please upload the monthly CSV.");
        return;
      }

      try {
        setStatus("Loading template.json from your GitHub repo...");
        const templateResponse = await fetch("./template.json");
        if (!templateResponse.ok) {
          throw new Error("Could not load template.json from the repo.");
        }
        const templateData = await templateResponse.json();

        setStatus("Reading CSV...");
        const csvText = await readFileAsText(csvFile);

        setStatus("Parsing CSV...");
        const rows = parseCSVRows(csvText);
        if (!rows.length) {
          throw new Error("No usable rows found in CSV.");
        }

        setStatus("Building scene list from template...");
        const output = buildFromTemplate(templateData, rows);

        downloadJSON(output, "updated_scene_collection.json");
        setStatus(
          "Done.\n" +
          "Rows found: " + rows.length + "\n" +
          "New OBS file is ready to download."
        );
      } catch (error) {
        console.error(error);
        alert("Error: " + error.message);
        setStatus("Error: " + error.message);
      }
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsText(file);
      });
    }

    function splitCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function cleanCell(value) {
      return String(value || "").trim().replace(/^"|"$/g, "");
    }

    function normalizeLot(rawLot) {
      const lot = rawLot.replace(/\s+/g, "").toUpperCase();
      const match = lot.match(/^(\d+)([A-Z])$/);
      if (match) {
        return match[1] + "-" + match[2];
      }
      return lot;
    }

    function parseCSVRows(csvText) {
      const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== "");
      if (lines.length < 2) return [];

      const headers = splitCSVLine(lines[0]).map(h => cleanCell(h));
      const lotIndex = headers.findIndex(h => h.toLowerCase() === "lot number");
      const typeIndex = headers.findIndex(h => h.toLowerCase() === "type");

      if (lotIndex === -1) {
        throw new Error('Could not find "Lot Number" column.');
      }
      if (typeIndex === -1) {
        throw new Error('Could not find "Type" column.');
      }

      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = splitCSVLine(lines[i]);
        const lot = normalizeLot(cleanCell(cols[lotIndex] || ""));
        const type = cleanCell(cols[typeIndex] || "");

        if (!lot) continue;

        rows.push({
          lot,
          type
        });
      }

      return rows;
    }

    function normalizeSceneName(name) {
      return String(name).replace(/\s+/g, " ").trim();
    }

    function isLotScene(name) {
      const cleaned = normalizeSceneName(name);
      return /^\d+(-[A-Z])? (Transition|Video)$/.test(cleaned);
    }

    function getSceneMap(templateData) {
      const map = new Map();
      if (Array.isArray(templateData.sources)) {
        for (const source of templateData.sources) {
          if (source && source.name) {
            map.set(normalizeSceneName(source.name), deepClone(source));
          }
        }
      }
      return map;
    }

    function deepClone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function isOptionLot(lot) {
      return /^\d+-[A-Z]$/i.test(String(lot).trim());
    }

    function getOptionBase(lot) {
      const cleaned = String(lot).trim().toUpperCase();
      const match = cleaned.match(/^(\d+)-[A-Z]$/);
      return match ? match[1] : null;
    }

    function groupRows(rows) {
      const groups = [];
      let i = 0;

      while (i < rows.length) {
        const current = rows[i];
        const currentIsOption = isOptionLot(current.lot);
        const currentBase = getOptionBase(current.lot);

        if (!currentIsOption) {
          groups.push([current]);
          i++;
          continue;
        }

        const optionGroup = [current];
        let j = i + 1;

        while (j < rows.length) {
          const next = rows[j];
          const nextIsOption = isOptionLot(next.lot);
          const nextBase = getOptionBase(next.lot);

          if (
            nextIsOption &&
            nextBase === currentBase &&
            next.type === current.type
          ) {
            optionGroup.push(next);
            j++;
          } else {
            break;
          }
        }

        groups.push(optionGroup);
        i = j;
      }

      return groups;
    }

    function getBreedTransitionName(typeValue) {
      const t = typeValue.toLowerCase();

      if (t.includes("char")) return "Charloais Transition";
      if (t.includes("native")) return "Native Transition";
      if (t.includes("holstein")) return "Hosltein Transition";

      return null;
    }

    function buildFromTemplate(templateData, rows) {
      const sceneMap = getSceneMap(templateData);
      const originalSceneOrder = templateData.scene_order.map(s => s.name);

      const fixedStartScenes = [
        "CMS Logo",
        "Waiting Room Scene",
        "Intro Video",
        "CMS Name Panel"
      ];

      const fixedEndScenes = [
        "CMS Name Panel END",
        "End Scene",
        "THIS IS THE END",
        "STOPPPPP",
        "I AM SERIOUS"
      ];

      const optionInterludeName = originalSceneOrder.find(name =>
        normalizeSceneName(name).startsWith("Option Lot Interlude")
      );

      if (!optionInterludeName) {
        throw new Error("Could not find an Option Lot Interlude scene in template.json.");
      }

      const groups = groupRows(rows);

      const auctionBody = [];
      let lastBreedTransition = null;
      let firstBreedSection = true;

      for (const group of groups) {
        const firstRow = group[0];
        const breedTransition = getBreedTransitionName(firstRow.type);

        if (!firstBreedSection && breedTransition && breedTransition !== lastBreedTransition) {
          auctionBody.push(breedTransition);
        }

        if (firstBreedSection) {
          firstBreedSection = false;
        }

        if (breedTransition) {
          lastBreedTransition = breedTransition;
        }

        const isOptionGroup =
          group.length > 1 &&
          group.every(row => isOptionLot(row.lot)) &&
          group.every(row => getOptionBase(row.lot) === getOptionBase(group[0].lot));

        if (isOptionGroup) {
          auctionBody.push(optionInterludeName);
        }

        for (const row of group) {
          auctionBody.push(row.lot + " Transition");
          auctionBody.push(row.lot + " Video");
        }

        if (isOptionGroup) {
          auctionBody.push(optionInterludeName);
        }
      }

      const finalSceneNames = [
        ...fixedStartScenes,
        ...auctionBody,
        ...fixedEndScenes
      ];

      const newSceneOrder = [];
      const newSources = [];
      const usedSourceNames = new Set();

      for (const targetName of finalSceneNames) {
        let templateSceneName = targetName;

        if (!sceneMap.has(normalizeSceneName(templateSceneName))) {
          if (isLotScene(targetName)) {
            templateSceneName = findAnyAvailableLotTemplate(originalSceneOrder, usedSourceNames);
            if (!templateSceneName) {
              throw new Error("Not enough lot template scenes in template.json.");
            }
          } else if (normalizeSceneName(targetName).startsWith("Option Lot Interlude")) {
            templateSceneName = optionInterludeName;
          } else {
            throw new Error("Could not find template scene: " + targetName);
          }
        }

        const normalizedTemplateName = normalizeSceneName(templateSceneName);

        if (isLotScene(targetName)) {
          usedSourceNames.add(normalizedTemplateName);
        }

        newSceneOrder.push({ name: targetName });

        const sourceTemplate = sceneMap.get(normalizedTemplateName);
        if (sourceTemplate) {
          const clonedSource = deepClone(sourceTemplate);
          clonedSource.name = targetName;
          newSources.push(clonedSource);
        }
      }

      const output = deepClone(templateData);
      output.scene_order = newSceneOrder;

      const preservedNonSceneSources = (templateData.sources || []).filter(
        s => s.id !== "scene"
      );

      output.sources = [...newSources, ...deepClone(preservedNonSceneSources)];
      output.current_scene = "STOPPPPP";
      output.current_program_scene = "End Scene";

      return output;
    }

    function findAnyAvailableLotTemplate(sceneNames, usedSourceNames) {
      for (const name of sceneNames) {
        const cleaned = normalizeSceneName(name);
        if (isLotScene(cleaned) && !usedSourceNames.has(cleaned)) {
          return name;
        }
      }
      return null;
    }

    function downloadJSON(data, filename) {
      const blob = new Blob([JSON.stringify(data, null, 2)], {
        type: "application/json"
      });

      const url = URL.createObjectURL(blob);
      const link = document.getElementById("downloadLink");
      link.href = url;
      link.download = filename;
      link.style.display = "inline-block";
      link.textContent = "Download Updated OBS File";
    }
  </script>
</body>
</html>
